<div
    class="flex grow min-h-screen justify-center flex-col"
>
    <nav
        class="hidden w-full h-[5vh] bg-gray-300 md:flex flex-row"
    >
        <div class="border-r-gray-400 text-gray-600 border-r-2 w-[50%] h-full flex justify-center items-center">
            <button
                class="hover:text-gray-900 cursor-pointer active:text-gray-400"
                //(click)="filter.set(`clothing`)"
                routerLink="/catalog/clothing"
            >Clothes</button>
        </div>
        <div class="border-r-gray-400 border-r-2 w-[50%] h-full text-gray-600 flex justify-center items-center">
            <button
                class="hover:text-gray-900 cursor-pointer active:text-gray-400"
                //(click)="filter.set(`electronics`)"
                routerLink="/catalog/electronics"
            >Electronics</button>
        </div>
        <div class="w-[50%] h-full text-gray-600 flex justify-center items-center">
            <button
                class="hover:text-gray-900 cursor-pointer active:text-gray-400"
                //(click)="filter.set(`jewelery`)"
                routerLink="/catalog/jewelery"
            >Jewelery</button>
        </div>
    </nav>

    @if(filter() === "clothing" || filter() === "women" || filter() === "men"){
    <nav
        class="w-full h-[10vh]  flex flex-row justify-around items-center"
    >
        <div 
            class="hover:text-gray-900 cursor-pointer active:text-gray-400  w-[10%] h-[50%] flex justify-center items-center"
            //(click)="filter.set(`men`)"
            routerLink="/catalog/men"
        >
            <button
                class="cursor-pointer"
            >Men's</button>
        </div>
        <div 
            class="hover:text-gray-900 cursor-pointer active:text-gray-400 w-[10%] h-[50%] flex justify-center items-center"
            //(click)="filter.set(`women`)"
            routerLink="/catalog/women"
        >
            <button
                class="cursor-pointer"
            >Woman's</button>
        </div>
    </nav>
    }

    <div 
        class="grid w-full mt-0  justify-items-center grid-cols-[repeat(auto-fill,minmax(250px,1fr))] gap-x-10 m-auto px-5 justify-center"
    >
        @for(product of display(); track $index){
            <app-product-card [product]="product"></app-product-card>
        }
    </div>
</div>

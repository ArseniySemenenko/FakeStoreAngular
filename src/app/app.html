<header
    class="h-[10vh] w-full bg-black fixed z-1 flex flex-row items-center justify-center" 
  >
    <div class="flex-1 pl-[10px]">
      <button
        (click) = "showSideBar.update(val => !val)"
        class="text-white font-[Bebas_Neue] text-3xl"
      >FakeStore</button>
    </div>
    <div
        class="hidden text-white md:flex flex-row justify-between w-[50%] items-center "
    >
        <div>
            <a
                routerLink='/catalog'
                class="hover:text-gray-600 cursor-pointer active:text-gray-400"
                //(click)="filter.set(`clothing`)"
            >Catalog</a>
        </div>
        <div>
            <a
                routerLink="/about"
                class="hover:text-gray-600 cursor-pointer active:text-gray-400"
                //(click)="filter.set(`electronics`)"
            >About</a>
        </div>
    </div>
    <div
        class="flex flex-1 h-full p-2 justify-end items-center"
    >
        <div class="pr-5">
            <button>
                <a routerLink="cart"><img src="cart.png"></a>
            </button>
        </div>
        <!--<div class="pr-1">
            <button>
                <img src="account.png">
            </button>
        </div>-->
    </div>
</header>

<div class="w-full min-h-[90vh] pt-[10vh]">
    <app-side-bar [isShow]="showSideBar()"></app-side-bar>
    <router-outlet></router-outlet>
</div>

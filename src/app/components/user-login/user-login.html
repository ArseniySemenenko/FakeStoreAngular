<div class="w-screen h-[90vh] flex flex-col items-center">
    @if(!this.userService.isLogined()){


    <nav class="font-bold w-[50%] h-[10vh] flex justify-around items-center">
        <div 
            (click)="login.set(false); this.errorLogin.set('')"
            class="hover:cursor-pointer active:text-gray-500"
        >
            Register
        </div>

        <div 
            class="hover:cursor-pointer active:text-gray-500"
            (click)="login.set(true); this.errorLogin.set('')"
        >
            LogIn
        </div>
    </nav>

    @if(login()){
        <div>
            <h1 class="text-center font-[Bebas_Neue] text-7xl lg:text-8xl mt-[10vh]"> Login </h1>
            @if(errorLogin()){
                <h3 class="text-red-700">{{errorLogin()}}</h3>
            }
        </div>
        
        <div class="flex flex-col gap-5 mt-[5vh]">
            <input [(ngModel)]="name" type="text" placeholder="USERNAME" class="px-10 py-4 border-2 border-black focus:outline-0">
            <input [(ngModel)]="password" type="text" placeholder="PASSWORD" class="px-10 py-4 border-2 border-black focus:outline-0">
            <button 
                class="px-10 py-4 border-2 bg-black text-white"
                (click)="loginUser()"
            >LOG IN</button>
        </div>
    }@else{
        <div>
            <h1 class=" text-center font-[Bebas_Neue] text-7xl lg:text-8xl mt-[10vh]"> REGISTER </h1>
            @if(errorLogin()){
                <h3 class=" text-center text-red-700">{{errorLogin()}}</h3>
            }
        </div>
        
        <div class="flex flex-col gap-5 mt-[5vh]">
            <input [(ngModel)]="name" type="text" placeholder="USERNAME" class="px-10 py-4 border-2 border-black focus:outline-0">
            <input [(ngModel)]="password" type="text" placeholder="PASSWORD" class="px-10 py-4 border-2 border-black focus:outline-0">
            <input [(ngModel)]="email" type="text" placeholder="EMAIL" class="px-10 py-4 border-2 border-black focus:outline-0">
            <button 
                class="px-10 py-4 border-2 bg-black text-white"
                (click)="registerUser()"
            >REGISTER</button>
        </div>
    }

    }
    @else{
        <app-user-details></app-user-details>
    }
</div>

<div class="flex justify-center items-center w-screen pt-10 md:pt-0 min-h-screen px-[10%]">
    <div class="flex flex-col">
        <div class="flex flex-col md:flex-row">
            <div class="flex h-full justify-center mb-15 md:pb-0,mb-0 md:w-[30vw] md:h-[30vh] md:pr-10">
                <img 
                    class="h-full"
                    src={{product().image}} 
                    alt=""
                >
            </div>
            <div>
                <p class="font-bold text-2xl md:text-3xl lg:text-5xl">{{product().title}}</p>
                <div class="flex pt-10 justify-between items-center w-[200px] md:w-[300px] lg:w-[400px]">
                    <div>
                        <p class="font-bold text-2xl md:text-3xl lg:text-5xl text-green-600">
                            {{product().price}}$
                        </p>
                    </div>
                    <div>
                        @if(!isInCart()){
                            <button
                                (click)="addToCart()"
                            >Add to card</button>
                        }
                        @else{
                            <button
                                class="text-gray-500"
                                (click)="removeFromCart()"
                            >
                                in cart
                            </button>
                        }
                    </div>
                </div>
            </div>
        </div>
        <div class="pt-10">
            <p>{{product().description}}</p>
        </div>
    </div>
</div>

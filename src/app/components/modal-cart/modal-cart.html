<div
    class="w-screen flex flex-col items-center pt-[10vh]"
>
    @if(cart.length > 0){
        @for(prod of cart; track prod.id){
            <app-cart-item [product]="prod"></app-cart-item>
        } 
    }
    @else{
        <h1 class="font-bold text-2xl md:text-3xl lg:text-5xl pt-10">No products in cart</h1>
    }
</div>

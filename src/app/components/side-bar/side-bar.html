@if(isShow()){
    <div class="h-[90vh] w-[300px] text-white bg-black fixed z-1">
        <nav class="md:hidden flex py-5 justify-around">
                 <div>
            <a
                (click)="isShow.set(false)"
                routerLink='/catalog'
                class="hover:text-gray-600 cursor-pointer active:text-gray-400"
            >Catalog</a>
        </div>
        <div>
            <a
                (click)="isShow.set(false)"
                routerLink="/about"
                class="hover:text-gray-600 cursor-pointer active:text-gray-400"
            >About</a>
        </div>
        </nav>
        <nav class="md:hidden lg:hidden">
            <div class="flex flex-col">
                <div class="bg-gray-300 py-3 border-gray-400 border-2 border-b-0 text-gray-600  w-full flex justify-center items-center">
            <button
                class="hover:text-gray-900 cursor-pointer active:text-gray-400"
                routerLink="/catalog/clothing"
            >Clothes</button>
        </div>
        <div class="bg-gray-300 py-3 border-gray-400 border-2 border-b-0 w-full text-gray-600 flex justify-center items-center">
            <button
                class="hover:text-gray-900 cursor-pointer active:text-gray-400"
                routerLink="/catalog/electronics"
            >Electronics</button>
        </div>
        <div class="bg-gray-300 py-3 w-full border-gray-400 border-2 text-gray-600 flex justify-center items-center">
            <button
                class="hover:text-gray-900 cursor-pointer active:text-gray-400"
                routerLink="/catalog/jewelery"
            >Jewelery</button>
        </div>
            </div>
        </nav>

        <div class="p-5">
            <div>
                <p class="text-center">Price</p>
                <div class="flex flex-col">
                    <div>
                        <div>From</div>
                        <div>
                            <input class="bg-white text-black" type="text" [(ngModel)]="priceFrom"/>
                        </div>
                    </div>
                    <div>
                        <div>To</div>
                        <div>
                            <input class="bg-white text-black" type="text" [(ngModel)]="priceTo"/>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="p-5">
            <div class="flex ">
                <p class="pr-1">Sort by</p>
                <div>
                    <select
                        class="focus:outline-none"
                        [(ngModel)]="sortBy"
                    >

                        <option value="asc">Price down</option>

                        <option value="desc">Price up</option>

                        <option value="alph-down">Alphabet-dowm</option>

                        <option value="alph-up">Alphabet-up</option>

                    </select>
                </div>
            </div>
        </div>

        <a
            class="px-5"
            [routerLink]="[]"
            [queryParams]="{sort: sortBy(), from: priceFrom() , to: priceTo()}"
            (click)="isShow.set(false)"
        >Apply</a>
    </div>
}
